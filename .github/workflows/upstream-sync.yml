name: 🔄 Auto-Sync Upstream

on:
  schedule:
    - cron: '30 4 * * *' # Every day at 4:30 AM UTC
  workflow_dispatch: # Enable manual triggers

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add Upstream Remote
        run: git remote add upstream https://github.com/ml-explore/mlx-swift-lm.git

      - name: Fetch Upstream
        run: git fetch upstream

      - name: Create or Update Sync Branch
        id: sync_branch
        env:
          SYNC_PUSH_TOKEN: ${{ secrets.SWIFTLM_PR_TOKEN }}
        run: |
          git checkout -B sync/upstream-latest origin/main

          # This fork was reconstructed and does not share history with Apple
          # upstream, so ancestry checks like origin/main..upstream/main list
          # every upstream commit and cannot tell whether upstream advanced.
          # Track the last-synced upstream SHA in a committed state file, which
          # survives whichever merge method the human picks (merge or squash).
          STATE_FILE=".github/upstream-sync-state"
          UPSTREAM_SHA="$(git rev-parse upstream/main)"
          LAST_SYNCED=""
          if [ -f "$STATE_FILE" ]; then
            LAST_SYNCED="$(cat "$STATE_FILE")"
          fi
          if [ "$LAST_SYNCED" = "$UPSTREAM_SHA" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "Upstream unchanged since last sync (${UPSTREAM_SHA})."
            exit 0
          fi

          # Merge upstream with the fork winning every conflict, so the branch
          # keeps the fork's build wiring (the agoodkind/mlx-swift dependency and
          # the custom generation loop) and stays buildable for CI. Because the
          # histories are unrelated, this can still graft upstream files that
          # reference symbols the fork dropped, so the PR must not be merged until
          # the fork CI is green. Do not swallow failures: a hard merge error must
          # fail the job instead of pushing a broken tree.
          git merge -X ours --no-edit --allow-unrelated-histories \
            -m "chore: sync with upstream/main [skip ci]" upstream/main

          echo "${UPSTREAM_SHA}" > "$STATE_FILE"
          git add "$STATE_FILE"
          git commit -m "chore(sync): record upstream/main @ ${UPSTREAM_SHA} [skip ci]"

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          git push -f "https://x-access-token:${SYNC_PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" sync/upstream-latest

      - name: Create Pull Request to Main
        if: steps.sync_branch.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING_PR_NUMBER="$(gh api --method GET \
            "/repos/${GITHUB_REPOSITORY}/pulls" \
            -f base=main \
            -f head="${GITHUB_REPOSITORY_OWNER}:sync/upstream-latest" \
            -f state=open \
            --jq '.[0].number // empty')"
          if [ -n "$EXISTING_PR_NUMBER" ]; then
            echo "PR #${EXISTING_PR_NUMBER} already open for sync/upstream-latest."
            exit 0
          fi

          PR_BODY=$'Automated PR to synchronize the fork with Apple mlx-swift-lm upstream.\n\nThe merge uses `-X ours` across unrelated histories, so the fork build wiring wins on conflict and the branch stays buildable. This can graft upstream files that reference symbols the fork dropped, so **do not merge until the fork CI is green and a human has reviewed the diff**. A real vendored-core bump is manual work; this only carries upstream forward for review.'

          gh api --method POST \
            "/repos/${GITHUB_REPOSITORY}/pulls" \
            -f base=main \
            -f head="${GITHUB_REPOSITORY_OWNER}:sync/upstream-latest" \
            -f title="🔄 Auto-Sync: Apple Upstream Repository" \
            -f body="$PR_BODY" \
            --jq '.html_url'
